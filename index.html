<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #F5C542;
    --gold-dim: #c9981c;
    --bg: #0A0A0A;
    --surface: #141414;
    --surface2: #1E1E1E;
    --text: #F0EDE6;
    --muted: #888;
    --tg-blue: #229ED9;
    --tg-blue-dark: #1a7fb3;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    margin: 0 auto;
    padding: 24px 24px 36px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .header {
    width: 100%;
    padding: 36px 0 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo-link {
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .logo-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 0.06em;
    line-height: 1;
    background: linear-gradient(135deg, #ffffff 30%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero {
    width: 100%;
    text-align: center;
    margin: 12px 0 28px;
    padding: 0 4px;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 12vw, 66px);
    font-weight: 900;
    line-height: 1.03;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    text-shadow:
      0 0 18px rgba(245, 197, 66, 0.08),
      0 2px 12px rgba(0, 0, 0, 0.45);
  }

  .hero-title span {
    color: var(--gold);
    font-style: italic;
  }

  .tg-btn-wrap {
    width: 100%;
    margin: 4px 0 0;
  }

  .tg-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 13px;
    width: 100%;
    padding: 19px 28px;
    background: var(--tg-blue);
    color: #fff;
    border-radius: 16px;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.18s, transform 0.14s, box-shadow 0.18s;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border: none;
    box-shadow: 0 14px 32px rgba(34, 158, 217, 0.18);
  }

  .tg-btn::after {
    content: '';
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.38) 50%, transparent 100%);
    transform: skewX(-20deg);
    animation: shine 2.6s ease-in-out infinite;
  }

  @keyframes shine {
    0%   { left: -75%; }
    55%  { left: 130%; }
    100% { left: 130%; }
  }

  .tg-btn:hover {
    background: var(--tg-blue-dark);
    transform: translateY(-2px);
    box-shadow: 0 18px 36px rgba(34, 158, 217, 0.24);
  }

  .tg-btn:active {
    transform: scale(0.97);
  }

  .tg-btn svg {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
  }

  .divider {
    width: 100%;
    margin: 28px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--surface2) 40%, var(--surface2) 60%, transparent);
  }

  .divider-dot {
    width: 5px;
    height: 5px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0.6;
  }

  .setup-section {
    width: min(100%, 200px);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;

    padding: 9px 8px 10px;
    border: 1px solid rgba(245, 197, 66, 0.10);
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(20,20,20,0.92) 0%, rgba(10,10,10,0.98) 100%);
    box-shadow: 0 8px 18px rgba(0,0,0,0.22);
  }

  .setup-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    line-height: 0.95;
    letter-spacing: 0.06em;
    color: var(--text);
    white-space: normal;
    max-width: 100%;
  }

  .setup-heading em {
    color: var(--gold);
    font-style: normal;
  }

  .setup-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;

    padding: 9px 10px;
    border-radius: 10px;
    background: var(--gold);
    color: #0A0A0A;

    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    text-decoration: none;

    border: none;
    position: relative;
    overflow: hidden;

    box-shadow: 0 8px 16px rgba(245, 197, 66, 0.12);
    transition: transform 0.14s, background 0.18s, box-shadow 0.18s;
  }

  .setup-btn::after {
    content: '';
    position: absolute;
    top: 0;
    left: -80%;
    width: 45%;
    height: 100%;
    background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
    transform: skewX(-20deg);
    animation: shine 3s 1.2s ease-in-out infinite;
  }

  .setup-btn:hover {
    background: var(--gold-dim);
    transform: translateY(-1px);
    box-shadow: 0 10px 18px rgba(245, 197, 66, 0.16);
  }

  .setup-btn:active {
    transform: scale(0.98);
  }

  .setup-btn svg {
    width: 14px;
    height: 14px;
  }

  .footer {
    margin-top: 32px;
    text-align: center;
    font-size: 12px;
    color: #444;
    letter-spacing: 0.05em;
  }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(34,158,217,0.5); }
    70%  { box-shadow: 0 0 0 16px rgba(34,158,217,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,158,217,0); }
  }

  .tg-btn { animation: pulse-ring 2.4s ease-out infinite; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header        { animation: fadeUp 0.5s ease both; }
  .hero          { animation: fadeUp 0.5s 0.1s ease both; }
  .tg-btn-wrap   { animation: fadeUp 0.5s 0.2s ease both; }
  .divider       { animation: fadeUp 0.5s 0.3s ease both; }
  .setup-section { animation: fadeUp 0.5s 0.38s ease both; }

  @media (max-width: 420px) {
    .page {
      padding: 18px 18px 28px;
    }

    .hero {
      margin-bottom: 24px;
    }

    .divider {
      margin: 20px 0;
    }

    .setup-section {
      width: min(100%, 185px);
      padding: 8px 7px 9px;
      gap: 7px;
    }

    .setup-heading {
      font-size: 20px;
    }

    .setup-btn {
      font-size: 9px;
      padding: 8px 9px;
    }
  }
</style>
